<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ultras French Discord</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #0a0f2c);
    color: white;
    text-align: center;
}

/* Effet néon */
.neon {
    color: #00ccff;
    text-shadow:
        0 0 5px #00ccff,
        0 0 10px #00ccff,
        0 0 20px #00ccff,
        0 0 40px #0099cc;
}

/* Contenu */
.container {
    margin-top: 120px;
}

/* Bouton */
.btn {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 20px;
    color: #00ccff;
    background: transparent;
    border: 2px solid #00ccff;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 0 10px #00ccff;
}

.btn:hover {
    background: #00ccff;
    color: black;
    box-shadow: 0 0 20px #00ccff, 0 0 40px #00ccff;
}

/* Image preview */
.preview {
    margin-top: 50px;
}

.preview img {
    width: 80%;
    max-width: 600px;
    border-radius: 15px;
    border: 2px solid #00ccff;
    box-shadow: 0 0 20px #00ccff;
    transition: 0.3s;
}

.preview img:hover {
    transform: scale(1.03);
}
</style>

</head>

<body>

<div class="container">
    <h1 class="neon">Rejoignez tous le meilleur serveur Discord</h1>
    <h2 class="neon">Ultras French</h2>

    <a href="https://discord.gg/AV5KxZTEA" target="_blank" class="btn">
        Rejoindre le serveur
    </a>

    <!-- IMAGE DU SERVEUR -->
    <div class="preview">
        <h3 class="neon">Aperçu du serveur</h3>

        <!-- Remplace image.png par ton image -->
        <img src="uf.png" alt="Aperçu du serveur Discord">
        <img src="uf2.png" alt="Aperçu du serveur Discord">
        <img src="uf3.png" alt="Aperçu du serveur Discord">
    </div>
</div>

</body>
</html>
